<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>How many layers</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
      text-align: center;
      padding: 50px 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 30px;
    }

    input {
      padding: 14px;
      font-size: 16px;
      width: 280px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .suggestions {
      max-width: 280px;
      margin: 10px auto;
      border: 1px solid #eee;
      border-radius: 10px;
      overflow: hidden;
    }

    .suggestions div {
      padding: 10px;
      cursor: pointer;
      background: #fff;
    }

    .suggestions div:hover {
      background: #f5f5f5;
    }

    .results {
      margin-top: 40px;
    }

    .card {
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 20px;
      margin: 10px auto;
      max-width: 280px;
    }

    .time {
      font-weight: bold;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

  <h1>How many layers today?</h1>

  <input id="input" placeholder="Enter your city..." autocomplete="off"/>
  <div id="suggestions" class="suggestions"></div>

  <div id="results" class="results"></div>

  <script>
    const input = document.getElementById("input");
    const suggestionsBox = document.getElementById("suggestions");
    const resultsDiv = document.getElementById("results");

    let selectedLocation = null;

    // 🔍 Fetch location suggestions (NO API KEY)
    input.addEventListener("input", async () => {
      const value = input.value;

      if (value.length < 2) {
        suggestionsBox.innerHTML = "";
        return;
      }

      try {
        const res = await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${value}`
        );

        const data = await res.json();

        if (!data.results) {
          suggestionsBox.innerHTML = "";
          return;
        }

        suggestionsBox.innerHTML = data.results
          .slice(0, 5)
          .map(
            (loc) => `
            <div onclick="selectLocation('${loc.name}', ${loc.latitude}, ${loc.longitude})">
              ${loc.name}, ${loc.country}
            </div>
          `
          )
          .join("");
      } catch (e) {
        console.error(e);
      }
    });

    // 📍 Select location
    function selectLocation(name, lat, lon) {
      input.value = name;
      suggestionsBox.innerHTML = "";

      selectedLocation = { lat, lon };
      fetchWeather();
    }

    // 🌤 Fetch weather (NO API KEY)
    async function fetchWeather() {
      try {
        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${selectedLocation.lat}&longitude=${selectedLocation.lon}&hourly=temperature_2m&forecast_days=1`
        );

        const data = await res.json();

        const nowIndex = 0;
        const plus3 = 3;
        const plus6 = 6;

        const temps = [
          data.hourly.temperature_2m[nowIndex],
          data.hourly.temperature_2m[plus3],
          data.hourly.temperature_2m[plus6],
        ];

        const labels = ["Now", "+3h", "+6h"];

        resultsDiv.innerHTML = temps
          .map((temp, i) => {
            return `
              <div class="card">
                <div class="time">${labels[i]}</div>
                <div>${temp.toFixed(1)}°C</div>
                <div>${getLayers(temp)}</div>
              </div>
            `;
          })
          .join("");
      } catch (e) {
        console.error(e);
      }
    }

    // 🧥 Layer logic
    function getLayers(temp) {
      if (temp >= 25) return "1 layer (t-shirt)";
      if (temp >= 18) return "2 layers (light layer)";
      if (temp >= 10) return "3 layers (jacket)";
      if (temp >= 0) return "4 layers (coat)";
      return "5 layers (winter gear)";
    }
  </script>

</body>
</html>
